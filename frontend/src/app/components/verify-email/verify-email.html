<div class="container d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 70px);">
  <div class="col-12 col-md-6 col-lg-5">
    <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
      <div class="card-body p-5 text-center">
        
        @if (status() === 'loading') {
          <div class="mb-4">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
              <span class="visually-hidden">Yükleniyor...</span>
            </div>
          </div>
          <h4 class="fw-bold mb-3">Doğrulanıyor</h4>
          <p class="text-muted">{{ message() }}</p>
        }

        @if (status() === 'success') {
          <div class="mb-4">
            <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-success bg-opacity-10 text-success" style="width: 80px; height: 80px;">
              <i class="bi bi-check-circle-fill" style="font-size: 2.5rem;"></i>
            </div>
          </div>
          <h4 class="fw-bold mb-3 text-success">Tebrikler!</h4>
          <p class="text-muted mb-4">{{ message() }}</p>
          <a routerLink="/login" class="btn btn-primary-custom px-5 py-2 rounded-pill fw-bold shadow-sm">
            Hemen Giriş Yap <i class="bi bi-arrow-right ms-2"></i>
          </a>
        }

        @if (status() === 'error') {
          <div class="mb-4">
            <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-danger bg-opacity-10 text-danger" style="width: 80px; height: 80px;">
              <i class="bi bi-x-circle-fill" style="font-size: 2.5rem;"></i>
            </div>
          </div>
          <h4 class="fw-bold mb-3 text-danger">Doğrulama Başarısız</h4>
          <p class="text-muted mb-4">{{ message() }}</p>
          <div class="d-flex gap-2 justify-content-center">
            <a routerLink="/login" class="btn btn-outline-secondary px-4 py-2 rounded-pill fw-500">
              Giriş Sayfası
            </a>
            <a routerLink="/register" class="btn btn-primary-custom px-4 py-2 rounded-pill fw-500 shadow-sm">
              Yeni Kayıt
            </a>
          </div>
        }

      </div>
    </div>
  </div>
</div>
