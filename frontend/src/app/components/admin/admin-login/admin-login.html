<div class="container d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 70px);">
  <div class="col-12 col-md-6 col-lg-4">
    <div class="card border-0 shadow-lg rounded-4 overflow-hidden" style="background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" 
               style="width: 60px; height: 60px; background: rgba(245, 166, 35, 0.15);">
            <i class="bi bi-shield-lock-fill text-warning fs-3"></i>
          </div>
          <h3 class="fw-bold mb-1 text-white">Yönetici Paneli</h3>
          <p class="text-muted small">Sadece yetkili kişiler giriş yapabilir</p>
        </div>

        @if (error()) {
          <div class="alert alert-danger bg-danger text-white border-0 py-2 small rounded-3 text-center">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error() }}
          </div>
        }

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
          <div class="mb-3">
            <label class="form-label small fw-500 text-white opacity-75">Yönetici E-posta</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent border-secondary text-muted">
                <i class="bi bi-envelope"></i>
              </span>
              <input type="email" class="form-control bg-transparent text-white border-secondary border-start-0 ps-0 admin-input" 
                     placeholder="admin@example.com" 
                     [(ngModel)]="email" name="email" required>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label small fw-500 text-white opacity-75">Şifre</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent border-secondary text-muted">
                <i class="bi bi-key"></i>
              </span>
              <input [type]="showPassword() ? 'text' : 'password'" class="form-control bg-transparent text-white border-secondary border-start-0 border-end-0 px-0 admin-input" 
                     placeholder="••••••••" 
                     [(ngModel)]="password" name="password" required>
              <button class="btn border border-secondary text-muted" style="background: transparent;" type="button" (click)="showPassword.set(!showPassword())">
                <i class="bi" [ngClass]="showPassword() ? 'bi-eye-slash' : 'bi-eye'"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-warning w-100 py-2 mb-3 fw-bold rounded-pill shadow-sm" [disabled]="loading() || !loginForm.form.valid">
            @if (loading()) {
              <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              Giriş Yapılıyor...
            } @else {
              Panele Giriş Yap
            }
          </button>
          
          <div class="text-center">
            <a routerLink="/login" class="text-decoration-none small text-muted hover-white transition-all">
              <i class="bi bi-arrow-left me-1"></i>Kullanıcı Girişine Dön
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
